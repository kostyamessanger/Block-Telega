name: 🛡️ NeTelega Builder

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          # Создаём папки
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/java/me/ne/telega
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/drawable
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/xml

          echo "📦 Создаю пустышку Telega..."

          # ==== ПУСТЫШКА (БЕЗ ИКОНКИ) ====
          mkdir -p fake_app/app/src/main/java/me/telega/android
          mkdir -p fake_app/app/src/main/res/layout

          cat > fake_app/app/src/main/AndroidManifest.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="me.telega.android">
              <application
                  android:allowBackup="true"
                  android:label="Telega"
                  android:theme="@style/Theme.AppCompat.Light">
                  <activity android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > fake_app/app/src/main/java/me/telega/android/MainActivity.java <<EOF
          package me.telega.android;
          import android.os.Bundle;
          import androidx.appcompat.app.AppCompatActivity;
          public class MainActivity extends AppCompatActivity {
              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);
              }
          }
          EOF

          cat > fake_app/app/src/main/res/layout/activity_main.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <TextView xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:gravity="center"
              android:text="Telega"
              android:textSize="24sp"/>
          EOF

          cat > fake_app/app/build.gradle <<EOF
          plugins {
              id 'com.android.application'
          }
          android {
              namespace 'me.telega.android'
              compileSdk 34
              defaultConfig {
                  applicationId 'me.telega.android'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }
              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }
          }
          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          cat > fake_app/gradle.properties <<EOF
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          cat > fake_app/settings.gradle <<EOF
          rootProject.name = 'FakeTelega'
          include ':app'
          EOF

          cat > fake_app/build.gradle <<EOF
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.4' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          mkdir -p fake_app/gradle/wrapper
          curl -s -o fake_app/gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar
          cat > fake_app/gradle/wrapper/gradle-wrapper.properties <<EOF
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          curl -s -o fake_app/gradlew https://raw.githubusercontent.com/gradle/gradle/master/gradlew
          chmod +x fake_app/gradlew

          cd fake_app
          ./gradlew assembleRelease --no-daemon
          cd ..

          # Подписываем пустышку
          echo "🔑 Подписываю пустышку..."
          keytool -genkey -v -keystore fake_keystore.jks -keyalg RSA -keysize 2048 -validity 10000 -alias fake -dname "CN=Fake, OU=Dev, O=Fake, L=City, ST=State, C=RU" -storepass 123456 -keypass 123456
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | head -1)
          $APKSIGNER sign --ks fake_keystore.jks --ks-pass pass:123456 --out fake_app/app/build/outputs/apk/release/fake_telega_signed.apk fake_app/app/build/outputs/apk/release/*.apk

          # Копируем подписанную пустышку в assets
          cp fake_app/app/build/outputs/apk/release/fake_telega_signed.apk app/src/main/assets/fake_telega.apk
          echo "✅ Пустышка me.telega.android создана и подписана"

          # ==== ОСНОВНОЕ ПРИЛОЖЕНИЕ NeTelega С КРАСИВЫМ ИНТЕРФЕЙСОМ ====
          echo "🎨 Создаю NeTelega с красивым интерфейсом..."

          # Красивый синий фон для layout
          cat > app/src/main/res/values/colors.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="blue_bg">#2196F3</color>
              <color name="red_bg">#F44336</color>
              <color name="white_text">#FFFFFF</color>
          </resources>
          EOF

          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="me.ne.telega">
              <uses-permission android:name="android.permission.REQUEST_INSTALL_PACKAGES" />
              <application
                  android:allowBackup="true"
                  android:label="NeTelega"
                  android:theme="@style/Theme.AppCompat.Light.NoActionBar">
                  <activity android:name=".MainActivity"
                      android:exported="true"
                      android:screenOrientation="portrait">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="\${applicationId}.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths" />
                  </provider>
              </application>
          </manifest>
          EOF

          cat > app/src/main/res/xml/file_paths.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
              <cache-path name="cache" path="/" />
          </paths>
          EOF

          # Главный layout с круглой кнопкой
          cat > app/src/main/res/layout/activity_main.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:id="@+id/mainLayout"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:background="@color/blue_bg">

              <TextView
                  android:id="@+id/titleText"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:layout_centerHorizontal="true"
                  android:layout_marginTop="80dp"
                  android:text="🛡️ NeTelega"
                  android:textColor="@color/white_text"
                  android:textSize="32sp"
                  android:textStyle="bold" />

              <TextView
                  android:id="@+id/statusText"
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:layout_below="@id/titleText"
                  android:layout_centerHorizontal="true"
                  android:layout_marginTop="20dp"
                  android:text="⚠️ Защита выключена"
                  android:textColor="@color/white_text"
                  android:textSize="18sp" />

              <Button
                  android:id="@+id/toggleButton"
                  android:layout_width="200dp"
                  android:layout_height="200dp"
                  android:layout_centerInParent="true"
                  android:background="@drawable/circle_button"
                  android:stateListAnimator="@null"
                  android:text="🔒"
                  android:textSize="48sp"
                  android:textColor="@color/white_text" />

          </RelativeLayout>
          EOF

          # Круглая форма для кнопки
          cat > app/src/main/res/drawable/circle_button.xml <<EOF
          <?xml version="1.0" encoding="utf-8"?>
          <shape xmlns:android="http://schemas.android.com/apk/res/android"
              android:shape="oval">
              <solid android:color="#FFFFFF" />
              <stroke
                  android:width="4dp"
                  android:color="#FFFFFF" />
          </shape>
          EOF

          # MainActivity.java с анимацией
          cat > app/src/main/java/me/ne/telega/MainActivity.java <<'EOF'
          package me.ne.telega;

          import android.animation.ArgbEvaluator;
          import android.animation.ObjectAnimator;
          import android.animation.ValueAnimator;
          import android.os.Bundle;
          import android.view.View;
          import android.widget.Button;
          import android.widget.RelativeLayout;
          import android.widget.TextView;
          import android.widget.Toast;
          import androidx.appcompat.app.AppCompatActivity;
          import androidx.core.content.FileProvider;
          import android.content.pm.PackageManager;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Build;
          import android.provider.Settings;
          import java.io.File;
          import java.io.FileOutputStream;
          import java.io.InputStream;

          public class MainActivity extends AppCompatActivity {
              private Button toggleButton;
              private TextView statusText;
              private RelativeLayout mainLayout;
              private boolean isBlocking = false;
              private static final String TARGET_PACKAGE = "me.telega.android";

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  setContentView(R.layout.activity_main);

                  toggleButton = findViewById(R.id.toggleButton);
                  statusText = findViewById(R.id.statusText);
                  mainLayout = findViewById(R.id.mainLayout);

                  isBlocking = isPackageInstalled(TARGET_PACKAGE);
                  updateUI(false);

                  toggleButton.setOnClickListener(v -> {
                      if (isBlocking) {
                          disableBlocking();
                      } else {
                          enableBlocking();
                      }
                  });
              }

              private boolean isPackageInstalled(String packageName) {
                  try {
                      getPackageManager().getPackageInfo(packageName, 0);
                      return true;
                  } catch (PackageManager.NameNotFoundException e) {
                      return false;
                  }
              }

              private void enableBlocking() {
                  if (Build.VERSION.SDK_INT >= Build.VERSION_CODES.O) {
                      if (!getPackageManager().canRequestPackageInstalls()) {
                          Intent intent = new Intent(Settings.ACTION_MANAGE_UNKNOWN_APP_SOURCES);
                          intent.setData(Uri.parse("package:" + getPackageName()));
                          startActivity(intent);
                          Toast.makeText(this, "Разрешите установку", Toast.LENGTH_LONG).show();
                          return;
                      }
                  }
                  installFakeTelega();
              }

              private void installFakeTelega() {
                  try {
                      InputStream in = getAssets().open("fake_telega.apk");
                      File tempFile = new File(getCacheDir(), "fake_telega.apk");
                      FileOutputStream out = new FileOutputStream(tempFile);
                      byte[] buffer = new byte[1024];
                      int read;
                      while ((read = in.read(buffer)) != -1) {
                          out.write(buffer, 0, read);
                      }
                      in.close();
                      out.close();

                      Uri apkUri = FileProvider.getUriForFile(this, getPackageName() + ".fileprovider", tempFile);

                      Intent intent = new Intent(Intent.ACTION_VIEW);
                      intent.setDataAndType(apkUri, "application/vnd.android.package-archive");
                      intent.addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION);
                      intent.addFlags(Intent.FLAG_ACTIVITY_NEW_TASK);
                      startActivity(intent);
                      Toast.makeText(this, "🔄 Установка блокировщика...", Toast.LENGTH_SHORT).show();

                      // Обновим UI после установки
                      new android.os.Handler().postDelayed(() -> {
                          if (isPackageInstalled(TARGET_PACKAGE)) {
                              isBlocking = true;
                              updateUI(true);
                          }
                      }, 3000);

                  } catch (Exception e) {
                      Toast.makeText(this, "❌ Ошибка: " + e.getMessage(), Toast.LENGTH_LONG).show();
                  }
              }

              private void disableBlocking() {
                  Intent intent = new Intent(Intent.ACTION_DELETE);
                  intent.setData(Uri.parse("package:" + TARGET_PACKAGE));
                  startActivity(intent);
                  Toast.makeText(this, "🔄 Удаление блокировщика...", Toast.LENGTH_SHORT).show();

                  new android.os.Handler().postDelayed(() -> {
                      if (!isPackageInstalled(TARGET_PACKAGE)) {
                          isBlocking = false;
                          updateUI(true);
                      }
                  }, 2000);
              }

              private void updateUI(boolean animate) {
                  if (isBlocking) {
                      toggleButton.setText("🔓");
                      statusText.setText("🛡️ Защита включена");
                      if (animate) {
                          animateBackground("#F44336", "#2196F3");
                      } else {
                          mainLayout.setBackgroundColor(getColor(R.color.red_bg));
                      }
                  } else {
                      toggleButton.setText("🔒");
                      statusText.setText("⚠️ Защита выключена");
                      if (animate) {
                          animateBackground("#2196F3", "#F44336");
                      } else {
                          mainLayout.setBackgroundColor(getColor(R.color.blue_bg));
                      }
                  }
              }

              private void animateBackground(String fromColor, String toColor) {
                  int from = android.graphics.Color.parseColor(fromColor);
                  int to = android.graphics.Color.parseColor(toColor);

                  ValueAnimator anim = ValueAnimator.ofObject(new ArgbEvaluator(), from, to);
                  anim.setDuration(800);
                  anim.addUpdateListener(animator -> {
                      mainLayout.setBackgroundColor((int) animator.getAnimatedValue());
                  });
                  anim.start();

                  // Анимация кнопки
                  toggleButton.animate().scaleX(1.2f).scaleY(1.2f).setDuration(300).withEndAction(() -> {
                      toggleButton.animate().scaleX(1f).scaleY(1f).setDuration(300).start();
                  }).start();
              }
          }
          EOF

          # build.gradle
          cat > app/build.gradle <<EOF
          plugins {
              id 'com.android.application'
          }

          android {
              namespace 'me.ne.telega'
              compileSdk 34

              defaultConfig {
                  applicationId 'me.ne.telega'
                  minSdk 21
                  targetSdk 34
                  versionCode 1
                  versionName '1.0'
              }

              buildTypes {
                  release {
                      minifyEnabled false
                  }
              }

              sourceSets {
                  main {
                      assets.srcDirs = ['src/main/assets']
                  }
              }
          }

          dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
          }
          EOF

          cat > gradle.properties <<EOF
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          cat > settings.gradle <<EOF
          rootProject.name = 'NeTelega'
          include ':app'
          EOF

          cat > build.gradle <<EOF
          buildscript {
              repositories { google(); mavenCentral() }
              dependencies { classpath 'com.android.tools.build:gradle:8.1.4' }
          }
          allprojects {
              repositories { google(); mavenCentral() }
          }
          EOF

          mkdir -p gradle/wrapper
          curl -s -o gradle/wrapper/gradle-wrapper.jar https://raw.githubusercontent.com/gradle/gradle/master/gradle/wrapper/gradle-wrapper.jar
          cat > gradle/wrapper/gradle-wrapper.properties <<EOF
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          curl -s -o gradlew https://raw.githubusercontent.com/gradle/gradle/master/gradlew
          chmod +x gradlew

          echo "🔨 Собираю NeTelega..."
          ./gradlew assembleRelease --no-daemon

          # Подписываем основное приложение
          echo "🔑 Подписываю NeTelega..."
          keytool -genkey -v -keystore keystore.jks -keyalg RSA -keysize 2048 -validity 10000 -alias release -dname "CN=NeTelega, OU=Dev, O=NeTelega, L=City, ST=State, C=RU" -storepass 123456 -keypass 123456
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name apksigner | head -1)
          $APKSIGNER sign --ks keystore.jks --ks-pass pass:123456 --out app-release-signed.apk app/build/outputs/apk/release/*.apk

          echo "✅ NeTelega подписан: app-release-signed.apk"

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: NeTelega-signed
          path: app-release-signed.apk
