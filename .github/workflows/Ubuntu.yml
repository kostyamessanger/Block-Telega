name: Ubuntu 24.04 SSH via Docker

on:
  workflow_dispatch:  # Запуск вручную

jobs:
  ubuntu-ssh:
    runs-on: ubuntu-22.04
    steps:
      # Шаг 1: Install Docker
      - name: Install Docker
        run: |
          sudo apt-get update
          sudo apt-get install -y docker.io
          sudo systemctl start docker
          sudo systemctl enable docker
          docker --version

      # Шаг 2: Pull Ubuntu 24.04
      - name: Pull Ubuntu 24.04
        run: |
          docker pull ubuntu:24.04

      # Шаг 3: Login on ubuntu and install SSH
      - name: Login on ubuntu and install SSH
        run: |
          # Запускаем контейнер с Ubuntu 24.04
          docker run -d --name ubuntu-ssh -p 2222:22 ubuntu:24.04 sleep infinity
          
          # Устанавливаем SSH-сервер и sudo
          docker exec ubuntu-ssh apt-get update
          docker exec ubuntu-ssh apt-get install -y openssh-server sudo
          
          # Создаём пользователя 'user' с паролем 'ubuntu'
          docker exec ubuntu-ssh useradd -m -s /bin/bash user
          echo "user:ubuntu" | docker exec -i ubuntu-ssh chpasswd
          docker exec ubuntu-ssh usermod -aG sudo user
          
          # Запускаем SSH-сервис
          docker exec ubuntu-ssh service ssh start
          
          echo "✅ SSH сервер запущен в контейнере Ubuntu 24.04"

      # Шаг 4: Generate Artifact with SSH credentials
      - name: Generate Artifact with SSH credentials
        run: |
          # Получаем IP адрес runner-а
          RUNNER_IP=$(curl -s ifconfig.me)
          
          # Создаём файл с данными для подключения
          cat > ssh-credentials.txt <<EOF
          ==========================================
          🐧 ДАННЫЕ ДЛЯ ПОДКЛЮЧЕНИЯ К UBUNTU 24.04
          ==========================================
          
          Адрес: $RUNNER_IP
          Порт: 2222
          Пользователь: user
          Пароль: ubuntu
          
          Команда для подключения:
          ssh -p 2222 user@$RUNNER_IP
          
          Внимание: Подключение возможно только во время выполнения workflow.
          Контейнер будет остановлен после завершения работы.
          ==========================================
          EOF
          
          echo "✅ Файл ssh-credentials.txt создан"

      # Загружаем файл как артефакт
      - name: Upload SSH credentials
        uses: actions/upload-artifact@v4
        with:
          name: ssh-credentials
          path: ssh-credentials.txt
          retention-days: 1  # Хранить артефакт 1 день

      # Держим контейнер запущенным для подключения
      - name: Keep container running
        run: |
          echo "=========================================="
          echo "🟢 Контейнер Ubuntu 24.04 запущен и ждёт подключения"
          echo "📥 Скачайте артефакт ssh-credentials для данных"
          echo "⏳ Workflow будет активен 30 минут"
          echo "=========================================="
          sleep 1800  # 30 минут на подключение
