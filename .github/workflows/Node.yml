name: 🤖 Node - Чат с Gemma 2

on:
  workflow_dispatch:
    inputs:
      prompt:
        description: '💬 Твой вопрос к Node'
        required: true
        default: 'Привет! Как дела?'

jobs:
  chat:
    runs-on: ubuntu-24.04
    steps:
      - name: Setup Ollama
        uses: ai-action/setup-ollama@v2

      - name: Pull Gemma 2 (27B)
        run: |
          ollama pull gemma2:27b

      - name: Chat with Node
        id: chat
        env:
          USER_PROMPT: ${{ github.event.inputs.prompt }}
        run: |
          # Системный промпт передаётся как часть запроса
          SYSTEM_PROMPT="Меня зовут Node, я энергичный парень, всегда готов помочь, говорю с огоньком: 😎🔥"
          
          # Отправляем запрос с системным промптом в теле запроса
          RESPONSE=$(ollama run gemma2:27b "[SYSTEM] $SYSTEM_PROMPT [/SYSTEM] User: $USER_PROMPT")
          
          echo "response=$RESPONSE" >> $GITHUB_OUTPUT
          echo "----------------------------------------"
          echo "💬 Node: $RESPONSE"
          echo "----------------------------------------"

      - name: Save response
        run: |
          echo "❓ Вопрос: ${{ github.event.inputs.prompt }}" >> chat_history.txt
          echo "💬 Ответ: ${{ steps.chat.outputs.response }}" >> chat_history.txt
          echo "----------------------------------------" >> chat_history.txt

      - name: Upload chat history
        uses: actions/upload-artifact@v4
        with:
          name: chat-history
          path: chat_history.txt
